<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 測試版</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; }
        textarea { width: 100%; height: 100px; margin-bottom: 10px; padding: 10px; box-sizing: border-box; }
        #sendBtn { width: 100%; padding: 15px; background: #06C755; color: white; border: none; border-radius: 8px; font-size: 18px; }
        #status { margin-top: 20px; color: blue; font-weight: bold; }
    </style>
</head>
<body>
    <h2>AI 語氣優化測試</h2>
    <textarea id="inputText" placeholder="請輸入文字..."></textarea>
    <button id="sendBtn">點我測試</button>
    <div id="status">等待點擊...</div>

    <script>
        // --- 核心設定 ---
        const LIFF_ID = "2009611601-cFSHJbYx"; // ⚠️ 請務必確認這裡填對了

        // 監聽按鈕點擊 (用最原始的方式)
        document.getElementById("sendBtn").onclick = async function() {
            const statusDiv = document.getElementById("status");
            const textVal = document.getElementById("inputText").value;
            
            // 1. 測試按鈕是否活著
            alert("按鈕已點擊！輸入內容為：" + textVal);
            statusDiv.innerText = "正在呼叫 AI...";

            try {
                // 2. 取得金鑰
                let apiKey = localStorage.getItem('gemini_api_key');
                if (!apiKey) {
                    apiKey = prompt("請輸入 Gemini API Key:");
                    if (apiKey) localStorage.setItem('gemini_api_key', apiKey);
                }

                // 3. 呼叫 Gemini
                const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
                const res = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "請將以下內容潤色為職場用語：" + textVal }] }]
                    })
                });
                const data = await res.json();
                
                if (data.error) throw new Error(data.error.message);
                const resultText = data.candidates[0].content.parts[0].text;

                // 4. 顯示結果
                alert("AI 優化成功：\n" + resultText);

                // 5. 嘗試發送
                if (liff.isInClient()) {
                    await liff.sendMessages([{ type: 'text', text: resultText }]);
                    liff.closeWindow();
                }
            } catch (err) {
                alert("出錯了：" + err.message);
            } finally {
                statusDiv.innerText = "等待點擊...";
            }
        };

        // 初始化 LIFF
        liff.init({ liffId: LIFF_ID })
            .then(() => { console.log("LIFF Init OK"); })
            .catch(err => { alert("LIFF 初始化失敗：" + err); });
    </script>
</body>
</html>
